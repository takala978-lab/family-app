.nav{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:8px 4px 20px;box-shadow:0 -2px 20px rgba(0,0,0,0.1);border-radius:20px 20px 0 0;z-index:100}

.btn-danger{background:var(--danger);color:white}

.btn-outline{background:transparent;border:2px solid var(--border);color:var(--text)}

.item-row{display:flex;align-items:center;gap:12px;padding:12px;background:#f8fafc;border-radius:10px;margin-bottom:8px}
.item-row.done{opacity:0.5}
.item-check{width:24px;height:24px;border:2px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.item-text{flex:1;font-weight:500}

.more-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.more-item{background:white;border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer}

.date-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;background:white;padding:12px;border-radius:12px}

.hidden{display:none!important}
.empty{text-align:center;padding:30px;color:var(--text-light)}

.divider{height:1px;background:var(--border);margin:16px 0}
.badge{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:0.7rem;font-weight:600}
.badge-success{background:#d1fae5;color:#166534}
.badge-warning{background:#fef3c7;color:#92400e}
.badge-danger{background:#fee2e2;color:#991b1b}

.reward-card.bonus{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-right:4px solid var(--success)}
.reward-card.punish{background:linear-gradient(135deg,#fee2e2,#fecaca);border-right:4px solid var(--danger)}
</style>
</head>

<script>
try{firebase.initializeApp({apiKey:"AIzaSyDZE0-OuAd_XiKTGy0lHsdhukraVYwEcAc",authDomain:"family-app-25459.firebaseapp.com",databaseURL:"https://family-app-25459-default-rtdb.firebaseio.com",projectId:"family-app-25459"});}catch(e){console.error(e);}

    {id:'car1',name:'רכב 1',plate:'',km:0,lastService:'',nextService:'',insurance:'',insuranceCompany:'',test:''},
    {id:'car2',name:'רכב 2',plate:'',km:0,lastService:'',nextService:'',insurance:'',insuranceCompany:'',test:''}
  ],

  emergency:{contacts:[{name:'משטרה',phone:'100',icon:'🚔'},{name:'מד״א',phone:'101',icon:'🚑'},{name:'כיבוי',phone:'102',icon:'🚒'}]}
};

let D=JSON.parse(JSON.stringify(DEFAULT));
let view='home',member=null,mTab='schedule',shopCat='all',calDate=new Date(),selDate=null,isAdmin=false,moreTab='main';
let homeDate=new Date();

function sync(s){document.getElementById('sync-badge').className='sync-badge '+s;document.getElementById('sync-text').textContent=s==='online'?'✓':'⚠';}
function save(){sync('syncing');dataRef.set(D).then(()=>sync('online')).catch(()=>sync('offline'));}
dataRef.on('value',snap=>{const v=snap.val();if(v)D={...DEFAULT,...v};document.getElementById('loading').classList.add('hidden');sync('online');render();});

function nav(v){view=v;member=null;moreTab='main';document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`[data-view="${v}"]`)?.classList.add('active');render();}
function showMember(id){member=id;mTab='schedule';render();}
function setMTab(t){mTab=t;render();}
function setMoreTab(t){moreTab=t;render();}

function showLock(){document.getElementById('lock-overlay').classList.remove('hidden');['pin1','pin2','pin3','pin4'].forEach(id=>document.getElementById(id).value='');document.getElementById('pin-error').classList.remove('show');setTimeout(()=>document.getElementById('pin1').focus(),100);}
function closeLock(){document.getElementById('lock-overlay').classList.add('hidden');}
function handlePin(d){const i=document.getElementById('pin'+d);if(i.value&&d<4)document.getElementById('pin'+(d+1)).focus();const p=['pin1','pin2','pin3','pin4'].map(id=>document.getElementById(id).value).join('');if(p.length===4){if(p===PIN){isAdmin=true;closeLock();updateBadge();render();}else{document.getElementById('pin-error').classList.add('show');document.querySelectorAll('.pin-digit').forEach(el=>{el.style.borderColor='var(--danger)';});setTimeout(()=>{document.querySelectorAll('.pin-digit').forEach(el=>{el.style.borderColor='';el.value='';});document.getElementById('pin1').focus();},500);}}}

function parseDate(s){if(!s)return new Date();const[y,m,d]=s.split('-');return new Date(parseInt(y),parseInt(m)-1,parseInt(d));}

function render(){const app=document.getElementById('app');if(member)app.innerHTML=renderMember();else if(view==='home')app.innerHTML=renderHome();else if(view==='shop')app.innerHTML=renderShop();else if(view==='cal')app.innerHTML=renderCal();else if(view==='tasks')app.innerHTML=renderTasks();else if(view==='more')app.innerHTML=renderMore();else app.innerHTML=renderHome();}

function changeHomeDate(delta){homeDate.setDate(homeDate.getDate()+delta);render();}

function renderHome(){
  const dateStr=homeDate.toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const dayIdx=homeDate.getDay();
  const todayDateStr=fmtDate(homeDate);
  
  // Get events for this day
  const dayEvents=(D.events||[]).filter(e=>e.date===todayDateStr).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  
  // Get workouts for this day
  const dayWorkouts=(D.workouts||[]).filter(w=>w.day===dayIdx);
  
  // Get sports from schedules for this day
  const sportFromSch=[];
  FAMILY.forEach(m=>{
    const sch=D.schedules?.[m.id]?.[dayIdx]||[];
    sch.forEach(l=>{
      if(l.s&&(l.s.includes('⚽')||l.s.includes('🏀')||l.s.includes('🎾')||l.s.includes('🏃'))){
        sportFromSch.push({member:m.id,time:l.t,activity:l.s,memberName:m.short,memberIcon:m.icon});
      }
    });
  });
  
  const tasks=(D.tasks||[]).filter(t=>!t.done);
  const shop=(D.shopping||[]).filter(s=>!s.done).slice(0,3);
  
  return `<div class="header"><h1>🏠 משפחת טקלה</h1></div>
<div class="date-nav">
  <button onclick="changeHomeDate(-1)">◀</button>
  <div class="date-text">${dateStr}</div>
  <button onclick="changeHomeDate(1)">▶</button>
</div>
<div style="text-align:center;margin-bottom:16px"><button class="btn btn-small btn-outline" onclick="goToday()">היום</button></div>

<div class="quick-actions">
<div class="quick-action" onclick="openAddShop()"><div class="icon">🛒</div><div class="label">קניות</div></div>
<div class="quick-action" onclick="openAddEvent()"><div class="icon">📅</div><div class="label">אירוע</div></div>
<div class="quick-action" onclick="openAddTask()"><div class="icon">✅</div><div class="label">משימה</div></div>
<div class="quick-action" onclick="openAddWorkout()"><div class="icon">🏃</div><div class="label">אימון</div></div>
</div>

<div class="card"><div class="card-header"><div class="card-title">👨‍👩‍👧‍👦 בני המשפחה</div></div><div class="family-row">${FAMILY.map(m=>`<div class="family-avatar" onclick="showMember('${m.id}')"><div class="icon member-${m.id}">${m.icon}</div><div class="name">${m.short}</div></div>`).join('')}</div></div>

${dayEvents.length||dayWorkouts.length||sportFromSch.length?`<div class="card"><div class="card-title" style="margin-bottom:12px">📅 לו״ז היום</div>
${dayEvents.map(e=>{const t=EVENT_TYPES.find(x=>x.id===e.type)||EVENT_TYPES[0];const m=FAMILY.find(x=>x.id===e.member);return `<div class="item-row" style="border-right:3px solid ${t.color}"><div style="min-width:50px;font-weight:600">${e.time||'-'}</div><div style="flex:1"><div style="font-weight:600">${t.icon} ${e.title}</div><div class="item-meta">${m?m.icon+' '+m.short:'כולם'}</div></div></div>`;}).join('')}
${dayWorkouts.map(w=>{const m=FAMILY.find(x=>x.id===w.member);return `<div class="item-row" style="border-right:3px solid #8b5cf6"><div style="min-width:50px;font-weight:600">${w.time}</div><div style="flex:1"><div style="font-weight:600">🏃 ${w.activity}</div><div class="item-meta">${m?m.icon+' '+m.short:''}</div></div></div>`;}).join('')}
${sportFromSch.map(s=>`<div class="item-row" style="border-right:3px solid #3b82f6"><div style="min-width:50px;font-weight:600">${s.time}</div><div style="flex:1"><div style="font-weight:600">${s.activity}</div><div class="item-meta">${s.memberIcon} ${s.memberName} • מהמערכת</div></div></div>`).join('')}
</div>`:'<div class="card"><div class="empty" style="padding:20px"><span class="emoji">📭</span>אין אירועים להיום</div></div>'}

${tasks.length?`<div class="card"><div class="card-header"><div class="card-title">✅ משימות</div><span class="badge badge-warning">${tasks.length}</span></div>${tasks.slice(0,3).map((t,i)=>renderTask(t,D.tasks.indexOf(t))).join('')}</div>`:''}

${shop.length?`<div class="card"><div class="card-header"><div class="card-title">🛒 קניות</div></div>${shop.map((s,i)=>renderShopItem(s,D.shopping.indexOf(s))).join('')}</div>`:''}`;}

function renderShop(){
  const items=D.shopping||[];
  const filtered=shopCat==='all'?items:items.filter(s=>s.cat===shopCat);
  const pending=filtered.filter(s=>!s.done),done=filtered.filter(s=>s.done);
  const counts={};SHOP_CATS.forEach(c=>counts[c.id]=c.id==='all'?items.filter(s=>!s.done).length:items.filter(s=>s.cat===c.id&&!s.done).length);
  return `<div class="header"><h1>🛒 רשימת קניות</h1></div>
<div class="card"><div style="display:flex;gap:8px;margin-bottom:12px"><input type="text" class="form-input" id="quick-shop" placeholder="הוסף פריט..." onkeypress="if(event.key==='Enter')quickShop()" style="flex:1"><button class="btn btn-primary" onclick="quickShop()">+</button></div>
<div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:8px">${SHOP_CATS.map(c=>`<div class="tab ${shopCat===c.id?'active':''}" onclick="shopCat='${c.id}';render()">${c.icon}${counts[c.id]?` (${counts[c.id]})`:''}</div>`).join('')}</div></div>
<div class="card">${!pending.length&&!done.length?'<div class="empty"><span class="emoji">🛒</span>ריק</div>':''}${pending.map((s,i)=>renderShopItem(s,D.shopping.indexOf(s))).join('')}${done.length?`<div class="divider"></div><div style="font-size:0.8rem;color:var(--text-light);margin-bottom:8px">נקנו (${done.length})</div>${done.map((s,i)=>renderShopItem(s,D.shopping.indexOf(s))).join('')}<button class="btn btn-small btn-outline" onclick="D.shopping=D.shopping.filter(s=>!s.done);save();render()">🗑️ נקה</button>`:''}</div>
<button class="btn btn-primary btn-fab" onclick="openAddShop()">+</button>`;}

function renderShopItem(s,idx){const c=SHOP_CATS.find(x=>x.id===s.cat)||SHOP_CATS[1];return `<div class="item-row ${s.done?'done':''}"><div class="item-check ${s.done?'done':''}" onclick="D.shopping[${idx}].done=!D.shopping[${idx}].done;save();render()">${s.done?'✓':''}</div><div style="flex:1"><div class="item-text ${s.done?'done':''}">${s.name}</div><div class="item-meta">${c.icon} ${c.name}${s.qty?' • '+s.qty:''}</div></div><button class="item-delete" onclick="D.shopping.splice(${idx},1);save();render()">🗑️</button></div>`;}

function quickShop(){const i=document.getElementById('quick-shop'),n=i.value.trim();if(!n)return;if(!D.shopping)D.shopping=[];D.shopping.push({id:Date.now(),name:n,cat:'food',done:false});i.value='';save();render();}
function openAddShop(){modal('🛒 הוסף פריט',`<div class="form-group"><label>שם</label><input class="form-input" id="s-name"></div><div class="form-group"><label>קטגוריה</label><select class="form-select" id="s-cat">${SHOP_CATS.filter(c=>c.id!=='all').map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('')}</select></div><div class="form-group"><label>כמות</label><input class="form-input" id="s-qty" placeholder="2 ק״ג..."></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">ביטול</button><button class="btn btn-primary" onclick="saveShop()">הוסף</button></div>`);}
function saveShop(){const n=document.getElementById('s-name').value.trim();if(!n)return alert('נא שם');if(!D.shopping)D.shopping=[];D.shopping.push({id:Date.now(),name:n,cat:document.getElementById('s-cat').value,qty:document.getElementById('s-qty').value.trim(),done:false});save();closeModal();render();}

function renderCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth(),mName=calDate.toLocaleDateString('he-IL',{month:'long',year:'numeric'});
  const first=new Date(y,m,1),last=new Date(y,m+1,0),start=first.getDay(),days=last.getDate();
  const todayStr=fmtDate(new Date());
  const cells=[];
  const prev=new Date(y,m,0);for(let i=start-1;i>=0;i--)cells.push({d:prev.getDate()-i,other:true});
  for(let i=1;i<=days;i++){const dt=new Date(y,m,i),ds=fmtDate(dt),ev=(D.events||[]).filter(e=>e.date===ds);cells.push({d:i,date:ds,today:ds===todayStr,hasEv:ev.length>0,shabbat:dt.getDay()===6});}
  const rem=42-cells.length;for(let i=1;i<=rem;i++)cells.push({d:i,other:true});
  const selEv=selDate?(D.events||[]).filter(e=>e.date===selDate).sort((a,b)=>(a.time||'').localeCompare(b.time||'')):[];
  return `<div class="header"><h1>📅 לוח שנה</h1></div>
<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><button class="btn btn-small btn-outline" onclick="calDate.setMonth(calDate.getMonth()-1);selDate=null;render()">◀</button><div style="font-weight:700">${mName}</div><button class="btn btn-small btn-outline" onclick="calDate.setMonth(calDate.getMonth()+1);selDate=null;render()">▶</button></div>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'].map((d,i)=>`<div style="text-align:center;font-size:0.7rem;font-weight:600;color:${i===6?'var(--primary)':'var(--text-light)'};padding:8px 0">${d}</div>`).join('')}${cells.map(c=>`<div style="aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:0.85rem;cursor:pointer;position:relative;${c.other?'color:#cbd5e1;':c.today?'background:var(--primary);color:white;font-weight:700;':c.shabbat?'background:#f8fafc;':''}${c.date===selDate?'box-shadow:0 0 0 2px var(--primary);':''}" onclick="${c.date?`selDate='${c.date}';render()`:''}"><span>${c.d}</span>${c.hasEv?`<span style="position:absolute;bottom:4px;width:5px;height:5px;background:${c.today?'white':'var(--warning)'};border-radius:50%"></span>`:''}</div>`).join('')}</div></div>
${selDate?`<div class="card"><div class="card-header"><div class="card-title">📋 ${parseDate(selDate).toLocaleDateString('he-IL',{weekday:'long',day:'numeric',month:'long'})}</div><button class="btn btn-small btn-primary" onclick="openAddEvent('${selDate}')">+</button></div>${!selEv.length?'<div class="empty" style="padding:20px"><span class="emoji">📭</span>אין</div>':selEv.map((e,i)=>{const t=EVENT_TYPES.find(x=>x.id===e.type)||EVENT_TYPES[0];const mem=FAMILY.find(x=>x.id===e.member);return `<div class="item-row" style="border-right:3px solid ${t.color}"><div style="min-width:50px;font-size:0.75rem;color:var(--text-light)">${e.time||'כל היום'}</div><div style="flex:1"><div style="font-weight:600">${t.icon} ${e.title}</div><div class="item-meta">${mem?mem.icon+' '+mem.short:'כולם'}</div></div><button class="item-delete" onclick="D.events.splice(${D.events.indexOf(e)},1);save();render()">🗑️</button></div>`;}).join('')}</div>`:''}
<button class="btn btn-primary btn-fab" onclick="openAddEvent()">+</button>`;}

function openAddEvent(date){const def=date||selDate||fmtDate(new Date());modal('📅 אירוע חדש',`<div class="form-group"><label>כותרת</label><input class="form-input" id="e-title"></div><div class="form-group"><label>סוג</label><select class="form-select" id="e-type">${EVENT_TYPES.map(t=>`<option value="${t.id}">${t.icon} ${t.name}</option>`).join('')}</select></div><div class="form-row"><div class="form-group"><label>תאריך</label><input type="date" class="form-input" id="e-date" value="${def}"></div><div class="form-group"><label>שעה</label><input type="time" class="form-input" id="e-time"></div></div><div class="form-group"><label>למי?</label><select class="form-select" id="e-member"><option value="">כולם</option>${FAMILY.map(m=>`<option value="${m.id}">${m.icon} ${m.name}</option>`).join('')}</select></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">ביטול</button><button class="btn btn-primary" onclick="saveEvent()">שמור</button></div>`);}
function saveEvent(){const t=document.getElementById('e-title').value.trim();if(!t)return alert('נא כותרת');if(!D.events)D.events=[];D.events.push({id:Date.now(),title:t,type:document.getElementById('e-type').value,date:document.getElementById('e-date').value,time:document.getElementById('e-time').value,member:document.getElementById('e-member').value});save();closeModal();render();}

function renderTasks(){
  const tasks=D.tasks||[];
  const pending=tasks.filter(t=>!t.done),done=tasks.filter(t=>t.done);
  return `<div class="header"><h1>✅ משימות</h1></div>
<div class="card"><div class="card-header"><div class="card-title">📋 משימות</div><button class="btn btn-small btn-primary" onclick="openAddTask()">+</button></div>${!pending.length?'<div class="empty" style="padding:20px"><span class="emoji">🎉</span>אין</div>':pending.map((t,i)=>renderTask(t,tasks.indexOf(t))).join('')}</div>
${done.length?`<div class="card"><div class="card-title" style="margin-bottom:12px">✓ הושלמו</div>${done.map((t,i)=>renderTask(t,tasks.indexOf(t))).join('')}</div>`:''}
<button class="btn btn-primary btn-fab" onclick="openAddTask()">+</button>`;}

function renderTask(t,idx){const m=FAMILY.find(x=>x.id===t.kid);return `<div class="item-row" style="border-right:3px solid ${m?.color||'#ccc'}"><div class="item-check round ${t.done?'done':''}" onclick="toggleTask(${idx})">${t.done?'✓':''}</div><div style="flex:1"><div class="item-text ${t.done?'done':''}">${t.text}</div><div class="item-meta">${m?m.icon+' '+m.short:''} ${t.points?'• ⭐'+t.points:''}</div></div><button class="item-delete" onclick="D.tasks.splice(${idx},1);save();render()">🗑️</button></div>`;}
function toggleTask(idx){const t=D.tasks[idx];t.done=!t.done;if(t.done&&t.points&&t.kid){D.points[t.kid]=(D.points[t.kid]||0)+t.points;}save();render();}
function openAddTask(){modal('✅ משימה',`<div class="form-group"><label>משימה</label><input class="form-input" id="t-text"></div><div class="form-group"><label>למי?</label><select class="form-select" id="t-kid">${FAMILY.map(m=>`<option value="${m.id}">${m.icon} ${m.name}</option>`).join('')}</select></div><div class="form-group"><label>נקודות</label><input type="number" class="form-input" id="t-pts" value="5"></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">ביטול</button><button class="btn btn-primary" onclick="saveTask()">הוסף</button></div>`);}
function saveTask(){const t=document.getElementById('t-text').value.trim();if(!t)return alert('נא משימה');if(!D.tasks)D.tasks=[];D.tasks.push({id:Date.now(),text:t,kid:document.getElementById('t-kid').value,points:parseInt(document.getElementById('t-pts').value)||0,done:false});save();closeModal();render();}

  if(moreTab==='rewards')return renderRewards();
  if(moreTab==='cars')return renderCars();
  if(moreTab==='meals')return renderMeals();

  if(moreTab==='grades')return renderGrades();

  return `<div class="header"><h1>⚡ עוד</h1></div>
<div class="more-grid">
<div class="more-item" onclick="showEmergency()"><div class="icon">🚨</div><div class="label">חירום</div></div>
<div class="more-item" onclick="setMoreTab('money')"><div class="icon">💰</div><div class="label">חסכונות</div></div>
<div class="more-item" onclick="setMoreTab('rewards')"><div class="icon">🎁</div><div class="label">תגמולים</div></div>
<div class="more-item" onclick="setMoreTab('cars')"><div class="icon">🚗</div><div class="label">רכבים</div></div>
<div class="more-item" onclick="setMoreTab('grades')"><div class="icon">📊</div><div class="label">ציונים</div></div>
<div class="more-item" onclick="setMoreTab('meals')"><div class="icon">🍽️</div><div class="label">ארוחות</div></div>
<div class="more-item" onclick="setMoreTab('workouts')"><div class="icon">🏃</div><div class="label">אימונים</div></div>
</div>`;}

function renderMoney(){
  return `<div class="header"><h1>💰 חסכונות</h1><div class="header-sub"><button class="btn btn-small btn-outline" onclick="setMoreTab('main')" style="color:white;border-color:rgba(255,255,255,0.5)">← חזרה</button></div></div>
${KIDS.map(k=>`<div class="kid-card" style="border-color:${k.color}">
<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">

<div style="flex:1"><div style="font-size:1.3rem;font-weight:700">${k.name}</div><div style="color:var(--text-light)">⭐ ${D.points?.[k.id]||0} נקודות</div></div>
<div style="text-align:left"><div style="font-size:1.8rem;font-weight:700;color:var(--success)">₪${D.money?.[k.id]||0}</div></div>
</div>
<div style="display:flex;gap:8px">
<button class="btn btn-small btn-success" style="flex:1" onclick="changeMoney('${k.id}',1)">+ הוסף</button>
<button class="btn btn-small btn-danger" style="flex:1" onclick="changeMoney('${k.id}',-1)">- הורד</button>
</div>
</div>`).join('')}`;}

function changeMoney(kid,dir){
  const amt=prompt(dir>0?'סכום להוספה:':'סכום להורדה:');
  if(amt&&!isNaN(amt)){
    if(!D.money)D.money={};
    D.money[kid]=(D.money[kid]||0)+(parseInt(amt)*dir);
    save();render();
  }
}

  const rewards=(D.rewards||[]).filter(r=>r.type==='bonus');
  const punishments=(D.rewards||[]).filter(r=>r.type==='punish');
  return `<div class="header"><h1>🎁 תגמולים וקנסות</h1><div class="header-sub"><button class="btn btn-small btn-outline" onclick="setMoreTab('main')" style="color:white;border-color:rgba(255,255,255,0.5)">← חזרה</button></div></div>
<div class="card">
<div class="card-header"><div class="card-title">🎁 בונוסים</div><button class="btn btn-small btn-success" onclick="openAddReward('bonus')">+ הוסף</button></div>
${!rewards.length?'<div class="empty" style="padding:20px">אין בונוסים</div>':rewards.map((r,i)=>{

}).join('')}
</div>

<div class="card">
<div class="card-header"><div class="card-title">⚠️ קנסות</div><button class="btn btn-small btn-danger" onclick="openAddReward('punish')">+ הוסף</button></div>
${!punishments.length?'<div class="empty" style="padding:20px">אין קנסות</div>':punishments.map((r,i)=>{
  const k=FAMILY.find(x=>x.id===r.kid);
  const t=PUNISH_TYPES.find(x=>x.id===r.punishType)||PUNISH_TYPES[0];
  return `<div class="reward-card punish"><span style="font-size:1.5rem">${t.icon}</span><div style="flex:1"><div style="font-weight:600">${r.desc||t.name}</div><div class="item-meta">${k?k.icon+' '+k.short:''} ${r.value?'• '+r.value:''} ${r.active?'<span class="badge badge-danger">פעיל</span>':''}</div></div>
<button class="btn btn-small ${r.active?'btn-outline':'btn-warning'}" onclick="D.rewards[${D.rewards.indexOf(r)}].active=!D.rewards[${D.rewards.indexOf(r)}].active;save();render()">${r.active?'סיים':'הפעל'}</button>
<button class="item-delete" onclick="D.rewards.splice(${D.rewards.indexOf(r)},1);save();render()">🗑️</button></div>`;
}).join('')}
</div>`;}

function openAddReward(type){
  const isBonus=type==='bonus';
  modal(isBonus?'🎁 בונוס חדש':'⚠️ קנס חדש',`
<div class="form-group"><label>ילד</label><select class="form-select" id="r-kid">${KIDS.map(k=>`<option value="${k.id}">${k.icon} ${k.name}</option>`).join('')}</select></div>
<div class="form-group"><label>סוג</label><select class="form-select" id="r-type">${(isBonus?REWARD_TYPES:PUNISH_TYPES).map(t=>`<option value="${t.id}">${t.icon} ${t.name}</option>`).join('')}</select></div>
<div class="form-group"><label>תיאור</label><input class="form-input" id="r-desc" placeholder="${isBonus?'פיצה עם חברים':'ללא טלפון'}"></div>
<div class="form-group"><label>ערך/משך</label><input class="form-input" id="r-value" placeholder="${isBonus?'₪50':'שעתיים'}"></div>
<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">ביטול</button><button class="btn ${isBonus?'btn-success':'btn-danger'}" onclick="saveReward('${type}')">הוסף</button></div>`,isBonus?'success':'admin');
}

function saveReward(type){
  if(!D.rewards)D.rewards=[];
  const r={
    id:Date.now(),
    type,
    kid:document.getElementById('r-kid').value,
    desc:document.getElementById('r-desc').value.trim(),
    value:document.getElementById('r-value').value.trim(),
    active:type==='punish'
  };
  r[type==='bonus'?'rewardType':'punishType']=document.getElementById('r-type').value;
  D.rewards.push(r);
  save();closeModal();render();
}

function renderCars(){
  return `<div class="header"><h1>🚗 רכבים</h1><div class="header-sub"><button class="btn btn-small btn-outline" onclick="setMoreTab('main')" style="color:white;border-color:rgba(255,255,255,0.5)">← חזרה</button></div></div>
${(D.cars||[]).map((c,i)=>`<div class="car-card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<div style="font-size:1.2rem;font-weight:700">🚗 ${c.name}</div>
<button class="btn btn-small btn-primary" onclick="editCar(${i})">✏️ ערוך</button>
</div>
<div class="car-stat"><span>מספר רכב</span><strong>${c.plate||'לא הוזן'}</strong></div>
<div class="car-stat"><span>ק״מ</span><strong>${c.km?c.km.toLocaleString():'0'}</strong></div>
<div class="car-stat"><span>טיפול אחרון</span><strong>${c.lastService||'-'}</strong></div>
<div class="car-stat"><span>טיפול הבא</span><strong>${c.nextService||'-'}</strong></div>
<div class="car-stat"><span>טסט</span><strong>${c.test||'-'}</strong></div>
<div class="car-stat"><span>ביטוח עד</span><strong>${c.insurance||'-'}</strong></div>
<div class="car-stat"><span>חברה מבטחת</span><strong>${c.insuranceCompany||'-'}</strong></div>
</div>`).join('')}`;}

function editCar(idx){
  const c=D.cars[idx];
  modal('🚗 עריכת '+c.name,`
<div class="form-group"><label>שם הרכב</label><input class="form-input" id="c-name" value="${c.name||''}"></div>
<div class="form-group"><label>מספר רכב</label><input class="form-input" id="c-plate" value="${c.plate||''}" placeholder="12-345-67"></div>
<div class="form-group"><label>ק״מ נוכחי</label><input type="number" class="form-input" id="c-km" value="${c.km||0}"></div>
<div class="form-row">
<div class="form-group"><label>טיפול אחרון</label><input type="date" class="form-input" id="c-last" value="${c.lastService||''}"></div>
<div class="form-group"><label>טיפול הבא</label><input type="date" class="form-input" id="c-next" value="${c.nextService||''}"></div>
</div>
<div class="form-group"><label>טסט</label><input type="date" class="form-input" id="c-test" value="${c.test||''}"></div>
<div class="form-row">
<div class="form-group"><label>ביטוח עד</label><input type="date" class="form-input" id="c-ins" value="${c.insurance||''}"></div>
<div class="form-group"><label>חברה מבטחת</label><input class="form-input" id="c-comp" value="${c.insuranceCompany||''}"></div>
</div>
<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">ביטול</button><button class="btn btn-primary" onclick="saveCar(${idx})">שמור</button></div>`);
}

function saveCar(idx){
  const c=D.cars[idx];
  c.name=document.getElementById('c-name').value;
  c.plate=document.getElementById('c-plate').value;
  c.km=parseInt(document.getElementById('c-km').value)||0;
  c.lastService=document.getElementById('c-last').value;
  c.nextService=document.getElementById('c-next').value;
  c.test=document.getElementById('c-test').value;
  c.insurance=document.getElementById('c-ins').value;
  c.insuranceCompany=document.getElementById('c-comp').value;
  
  // Add to calendar
  if(c.nextService){
    if(!D.events)D.events=[];
    const exists=D.events.find(e=>e.autoId==='car-service-'+c.id);
    if(exists)D.events.splice(D.events.indexOf(exists),1);
    D.events.push({id:Date.now(),title:'טיפול '+c.name,type:'car',date:c.nextService,time:'09:00',member:'',autoId:'car-service-'+c.id});
  }
  if(c.test){
    const exists=D.events.find(e=>e.autoId==='car-test-'+c.id);
    if(exists)D.events.splice(D.events.indexOf(exists),1);
    D.events.push({id:Date.now(),title:'טסט '+c.name,type:'car',date:c.test,time:'09:00',member:'',autoId:'car-test-'+c.id});
  }
  
  save();closeModal();render();
}

function renderMeals(){
  return `<div class="header"><h1>🍽️ תפריט שבועי</h1><div class="header-sub"><button class="btn btn-small btn-outline" onclick="setMoreTab('main')" style="color:white;border-color:rgba(255,255,255,0.5)">← חזרה</button></div></div>
<div class="card">${DAYS.map((day,di)=>`<div style="padding:12px;background:#f8fafc;border-radius:10px;margin-bottom:8px">
<div style="font-weight:600;font-size:0.9rem;margin-bottom:8px">${day}</div>
<div style="display:flex;gap:6px;overflow-x:auto">${MEALS.map(meal=>{
  const key=di+'-'+meal;
  const items=D.meals?.[key]||[];
  const count=items.length;
  return `<div style="background:${count?'var(--primary)':'white'};color:${count?'white':'var(--text)'};border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:0.75rem;cursor:pointer;min-width:80px;text-align:center;flex:1" onclick="editMeal(${di},'${meal}')">
<div style="font-weight:600">${meal}</div>
${count?`<div style="font-size:0.65rem;opacity:0.9;margin-top:2px">${count} פריטים</div>`:'<div style="font-size:0.65rem;opacity:0.7;margin-top:2px">+ הוסף</div>'}
</div>`;
}).join('')}</div>
</div>`).join('')}</div>`;}

function editMeal(day,meal){
  const key=day+'-'+meal;
  if(!D.meals)D.meals={};
  if(!D.meals[key])D.meals[key]=[];
  const items=D.meals[key];
  
  let itemsHtml='';
  if(items.length){
    for(let i=0;i<items.length;i++){
      const item=items[i];
      const m=FAMILY.find(x=>x.id===item.who);
      const mName=m?m.icon+' '+m.short:'👨‍👩‍👧‍👦 כולם';
      itemsHtml+='<div class="item-row"><div style="flex:1"><div style="font-weight:600">'+item.name+'</div><div class="item-meta">'+mName+'</div></div><button class="btn btn-small btn-danger" onclick="removeMealItem('+day+',\''+meal+'\','+i+')">🗑️</button></div>';
    }
  }else{
    itemsHtml='<div class="empty" style="padding:20px"><span class="emoji">🍽️</span>אין פריטים</div>';
  }
  
  const formHtml='<div style="margin-bottom:16px">'+itemsHtml+'</div><div class="divider"></div><div style="font-weight:600;margin-bottom:12px">➕ הוסף פריט:</div><div class="form-group"><label>מה לאכול?</label><input class="form-input" id="meal-name" placeholder="חביתה, טוסט, סלט..."></div><div class="form-group"><label>למי?</label><select class="form-select" id="meal-who"><option value="all">👨‍👩‍👧‍👦 כל המשפחה</option>'+FAMILY.map(function(m){return '<option value="'+m.id+'">'+m.icon+' '+m.name+'</option>';}).join('')+'</select></div><div class="modal-actions"><button class="btn btn-outline" onclick="closeModal();render();">סגור</button><button class="btn btn-primary" onclick="saveMealItem('+day+',\''+meal+'\');">הוסף פריט</button></div>';
  
  modal('🍽️ '+DAYS[day]+' - ארוחת '+meal, formHtml);
}

function saveMealItem(day,meal){
  const key=day+'-'+meal;
  const nameEl=document.getElementById('meal-name');
  const whoEl=document.getElementById('meal-who');
  if(!nameEl){alert('שגיאה - לא נמצא שדה');return;}
  const name=nameEl.value.trim();
  const who=whoEl?whoEl.value:'all';
  if(!name){alert('נא להזין מה לאכול');return;}
  
  if(!D.meals)D.meals={};
  if(!D.meals[key])D.meals[key]=[];
  D.meals[key].push({name:name,who:who});
  save();
  closeModal();
  setTimeout(function(){editMeal(day,meal);},200);
}

function removeMealItem(day,meal,idx){
  const key=day+'-'+meal;
  if(D.meals&&D.meals[key]){
    D.meals[key].splice(idx,1);
    save();
    closeModal();
    setTimeout(function(){editMeal(day,meal);},200);
  }
}

function renderWorkouts(){
  const workouts=D.workouts||[];
  return `<div class="header"><h1>🏃 אימונים</h1><div class="header-sub"><button class="btn btn-small btn-outline" onclick="setMoreTab('main')" style="color:white;border-color:rgba(255,255,255,0.5)">← חזרה</button></div></div>
<div class="card">
<div class="card-header"><div class="card-title">🏃 אימונים שבועיים</div><button class="btn btn-small btn-primary" onclick="openAddWorkout()">+ הוסף</button></div>
${!workouts.length?'<div class="empty" style="padding:20px">אין אימונים</div>':workouts.map((w,i)=>{
  const m=FAMILY.find(x=>x.id===w.member);
  return `<div class="item-row" style="border-right:3px solid #8b5cf6"><span style="font-size:1.3rem">🏃</span><div style="flex:1"><div style="font-weight:600">${w.activity}</div><div class="item-meta">${m?m.icon+' '+m.short:''} • ${DAYS[w.day]} ${w.time}</div></div><button class="item-delete" onclick="D.workouts.splice(${i},1);save();render()">🗑️</button></div>`;
}).join('')}
</div>`;}

function openAddWorkout(){
  modal('🏃 אימון חדש',`
<div class="form-group"><label>סוג אימון</label><select class="form-select" id="w-type">${WORKOUT_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div>
<div class="form-group"><label>מי?</label><select class="form-select" id="w-member">${FAMILY.map(m=>`<option value="${m.id}">${m.icon} ${m.name}</option>`).join('')}</select></div>
<div class="form-row">
<div class="form-group"><label>יום</label><select class="form-select" id="w-day">${DAYS.map((d,i)=>`<option value="${i}">${d}</option>`).join('')}</select></div>
<div class="form-group"><label>שעה</label><input type="time" class="form-input" id="w-time" value="07:00"></div>
</div>
<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">ביטול</button><button class="btn btn-primary" onclick="saveWorkout()">הוסף</button></div>`);
}

function saveWorkout(){
  if(!D.workouts)D.workouts=[];
  const w={
    id:Date.now(),
    activity:document.getElementById('w-type').value,
    member:document.getElementById('w-member').value,
    day:parseInt(document.getElementById('w-day').value),
    time:document.getElementById('w-time').value
  };
  D.workouts.push(w);
  save();closeModal();render();
}

function renderGrades(){
  return `<div class="header"><h1>📊 ציונים</h1><div class="header-sub"><button class="btn btn-small btn-outline" onclick="setMoreTab('main')" style="color:white;border-color:rgba(255,255,255,0.5)">← חזרה</button></div></div>
${KIDS.filter(k=>k.grade!=='גן').map(k=>{
  const grades=D.grades?.[k.id]||[];
  const avg=grades.length?Math.round(grades.filter(g=>g.grade).reduce((a,g)=>a+(g.grade||0),0)/grades.filter(g=>g.grade).length):0;
  return `<div class="card">
<div class="card-header">
<div class="card-title"><span class="member-${k.id}" style="width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-left:8px">${k.icon}</span>${k.name}</div>
<button class="btn btn-small btn-primary" onclick="openAddGrade('${k.id}')">+ הוסף</button>
</div>
${avg?`<div style="text-align:center;margin-bottom:12px"><span style="font-size:2rem;font-weight:700;color:${avg>=80?'var(--success)':avg>=60?'var(--warning)':'var(--danger)'}">${avg}</span><div style="font-size:0.75rem;color:var(--text-light)">ממוצע</div></div>`:''}
${grades.length?grades.slice().reverse().slice(0,5).map(g=>`<div class="item-row" style="border-right:3px solid ${g.grade>=80?'var(--success)':g.grade>=60?'var(--warning)':'var(--danger)'}"><div style="flex:1"><div style="font-weight:600">${g.subject}</div><div class="item-meta">${g.date||''} ${g.type||''}</div></div><div style="font-size:1.3rem;font-weight:700;color:${g.grade>=80?'var(--success)':g.grade>=60?'var(--warning)':'var(--danger)'}">${g.grade||'-'}</div></div>`).join(''):'<div class="empty" style="padding:20px">אין ציונים</div>'}
</div>`;
}).join('')}`;}

function openAddGrade(kid){
  modal('📊 הוסף ציון',`
<div class="form-group"><label>מקצוע</label><input class="form-input" id="g-subj"></div>
<div class="form-group"><label>ציון</label><input type="number" class="form-input" id="g-val" min="0" max="100"></div>
<div class="form-row">
<div class="form-group"><label>סוג</label><select class="form-select" id="g-type"><option>מבחן</option><option>בוחן</option><option>עבודה</option></select></div>
<div class="form-group"><label>תאריך</label><input type="date" class="form-input" id="g-date" value="${fmtDate(new Date())}"></div>
</div>
<input type="hidden" id="g-kid" value="${kid}">
<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">ביטול</button><button class="btn btn-primary" onclick="saveGrade()">הוסף</button></div>`);
}

function saveGrade(){
  const kid=document.getElementById('g-kid').value;
  if(!D.grades)D.grades={};
  if(!D.grades[kid])D.grades[kid]=[];
  D.grades[kid].push({
    id:Date.now(),
    subject:document.getElementById('g-subj').value.trim(),
    grade:parseInt(document.getElementById('g-val').value)||null,
    type:document.getElementById('g-type').value,
    date:document.getElementById('g-date').value
  });
  save();closeModal();render();
}

function renderMember(){
  const m=FAMILY.find(x=>x.id===member);
  const sch=D.schedules?.[member]||{};
  const myTasks=(D.tasks||[]).filter(t=>t.kid===member);
  const myEvents=(D.events||[]).filter(e=>e.member===member);
  const myWorkouts=(D.workouts||[]).filter(w=>w.member===member);
  
  return `<div class="header" style="padding-bottom:10px"><button onclick="member=null;render()" style="background:rgba(255,255,255,0.2);border:none;color:white;padding:6px 14px;border-radius:8px;cursor:pointer">← חזרה</button></div>
<div style="display:flex;align-items:center;gap:16px;padding:16px;background:white;border-radius:16px;margin-bottom:16px">
<div class="member-${m.id}" style="width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem">${m.icon}</div>
<div style="flex:1"><div style="font-size:1.2rem;font-weight:700">${m.name}</div><div style="color:var(--text-light)">${m.grade?m.grade==='גן'?'גן חובה':'כיתה '+m.grade:''}</div></div>
${m.type==='child'?`<div style="text-align:center"><div style="font-size:1.2rem;font-weight:700;color:var(--success)">₪${D.money?.[m.id]||0}</div><div style="font-size:0.65rem;color:var(--text-light)">חיסכון</div></div>`:''}
</div>

<div class="tabs">${['schedule','tasks','events','workouts',m.type==='child'&&m.grade!=='גן'?'grades':null].filter(Boolean).map(t=>`<button class="tab ${mTab===t?'active':''}" onclick="setMTab('${t}')">${t==='schedule'?'📅 מערכת':t==='tasks'?'✅ משימות':t==='events'?'📋 אירועים':t==='workouts'?'🏃 אימונים':'📊 ציונים'}</button>`).join('')}</div>

${mTab==='schedule'?`<div class="card"><div class="card-title" style="margin-bottom:12px">📅 מערכת שעות</div>
<div style="overflow-x:auto"><table style="width:100%;min-width:500px;border-collapse:collapse;font-size:0.65rem">
<thead><tr><th style="background:var(--primary);color:white;padding:6px;width:50px">שעה</th>${DAYS.map((d,i)=>`<th style="background:${i===6?'#94a3b8':'var(--primary)'};color:white;padding:6px">${d}</th>`).join('')}</tr></thead>
<tbody>${TIMES.map(time=>`<tr><td style="background:#f1f5f9;padding:4px;font-weight:600;text-align:center">${time}</td>${[0,1,2,3,4,5,6].map(day=>{const l=(sch[day]||[]).find(x=>x.t===time);return `<td style="padding:3px;border:1px solid var(--border);text-align:center;cursor:pointer;${l?'background:rgba(102,126,234,0.15);font-weight:600':''}" onclick="editLesson('${member}',${day},'${time}')">${l?.s||''}</td>`;}).join('')}</tr>`).join('')}</tbody>
</table></div></div>`:''}

${mTab==='tasks'?`<div class="card"><div class="card-title" style="margin-bottom:12px">✅ המשימות שלי</div>${!myTasks.length?'<div class="empty" style="padding:20px"><span class="emoji">🎉</span>אין</div>':myTasks.map(t=>renderTask(t,D.tasks.indexOf(t))).join('')}</div>`:''}

${mTab==='events'?`<div class="card"><div class="card-header"><div class="card-title">📋 האירועים שלי</div><button class="btn btn-small btn-primary" onclick="openAddEventFor('${m.id}')">+</button></div>${!myEvents.filter(e=>parseDate(e.date)>=new Date()).length?'<div class="empty" style="padding:20px"><span class="emoji">📭</span>אין</div>':myEvents.filter(e=>parseDate(e.date)>=new Date()).sort((a,b)=>(a.date||'').localeCompare(b.date||'')).slice(0,10).map(e=>{const t=EVENT_TYPES.find(x=>x.id===e.type)||EVENT_TYPES[0];return `<div class="item-row" style="border-right:3px solid ${t.color}"><div style="min-width:60px;font-size:0.75rem;color:var(--text-light)">${parseDate(e.date).toLocaleDateString('he-IL',{day:'numeric',month:'short'})}</div><div style="flex:1"><div style="font-weight:600">${t.icon} ${e.title}</div><div class="item-meta">${e.time||'כל היום'}</div></div><button class="item-delete" onclick="D.events.splice(${D.events.indexOf(e)},1);save();render()">🗑️</button></div>`;}).join('')}</div>`:''}

${mTab==='workouts'?`<div class="card"><div class="card-header"><div class="card-title">🏃 האימונים שלי</div><button class="btn btn-small btn-primary" onclick="openAddWorkout()">+</button></div>${!myWorkouts.length?'<div class="empty" style="padding:20px">אין אימונים</div>':myWorkouts.map(w=>`<div class="item-row" style="border-right:3px solid #8b5cf6"><span style="font-size:1.3rem">🏃</span><div style="flex:1"><div style="font-weight:600">${w.activity}</div><div class="item-meta">${DAYS[w.day]} ${w.time}</div></div><button class="item-delete" onclick="D.workouts.splice(${D.workouts.indexOf(w)},1);save();render()">🗑️</button></div>`).join('')}</div>`:''}

${mTab==='grades'&&m.type==='child'&&m.grade!=='גן'?renderMemberGrades(m):''}`;}

function renderMemberGrades(m){
  const grades=D.grades?.[m.id]||[];
  return `<div class="card"><div class="card-header"><div class="card-title">📊 ציונים</div><button class="btn btn-small btn-primary" onclick="openAddGrade('${m.id}')">+</button></div>
${grades.length?grades.slice().reverse().map(g=>`<div class="item-row" style="border-right:3px solid ${(g.grade||0)>=80?'var(--success)':(g.grade||0)>=60?'var(--warning)':'var(--danger)'}"><div style="flex:1"><div style="font-weight:600">${g.subject}</div><div class="item-meta">${g.date||''}</div></div><div style="font-size:1.3rem;font-weight:700;color:${(g.grade||0)>=80?'var(--success)':(g.grade||0)>=60?'var(--warning)':'var(--danger)'}">${g.grade||'-'}</div></div>`).join(''):'<div class="empty" style="padding:20px">אין</div>'}
</div>`;
}

function openAddEventFor(mid){openAddEvent();setTimeout(()=>{document.getElementById('e-member').value=mid;},100);}

function editLesson(mid,day,time){
  const sch=D.schedules?.[mid]?.[day]||[];
  const cur=sch.find(l=>l.t===time)?.s||'';
  modal(`${DAYS[day]} ${time}`,`
<div class="form-group"><label>שיעור/פעילות</label><input class="form-input" id="l-text" value="${cur}"></div>
<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px">${['🏀 כדורסל','⚽ כדורגל','🎾 טניס','🏃 הישרדות','💼 עבודה'].map(x=>`<button class="btn btn-small btn-outline" type="button" onclick="document.getElementById('l-text').value='${x}'">${x.split(' ')[0]}</button>`).join('')}</div>
<div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">ביטול</button>${cur?`<button class="btn btn-danger" onclick="deleteLesson('${mid}',${day},'${time}')">🗑️</button>`:''}<button class="btn btn-primary" onclick="saveLesson('${mid}',${day},'${time}')">שמור</button></div>`);
}

function saveLesson(mid,day,time){
  const v=document.getElementById('l-text').value.trim();
  if(!D.schedules)D.schedules={};
  if(!D.schedules[mid])D.schedules[mid]={};
  if(!D.schedules[mid][day])D.schedules[mid][day]=[];
  const idx=D.schedules[mid][day].findIndex(l=>l.t===time);
  if(v){
    if(idx>=0)D.schedules[mid][day][idx].s=v;
    else{D.schedules[mid][day].push({t:time,s:v});D.schedules[mid][day].sort((a,b)=>a.t.localeCompare(b.t));}
  }else if(idx>=0)D.schedules[mid][day].splice(idx,1);
  save();closeModal();render();
}

function deleteLesson(mid,day,time){
  if(D.schedules?.[mid]?.[day]){
    const idx=D.schedules[mid][day].findIndex(l=>l.t===time);
    if(idx>=0)D.schedules[mid][day].splice(idx,1);
    save();
  }
  closeModal();render();
}

updateBadge();
</script>
</body>
</html>
